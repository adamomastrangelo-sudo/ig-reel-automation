name: Genera e pubblica Reel

on:
  schedule:
    # Ogni giorno alle 09:00 UTC. Modifica questa riga per cambiare la cadenza
    # (es. "0 9 * * 1,4" = lunedì e giovedì).
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Genera il video
        run: bash scripts/generate_video.sh

      - name: Crea GitHub Release con il video (hosting pubblico)
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="reel-$(date -u +%Y%m%d-%H%M%S)"
          gh release create "$TAG" output/reel.mp4 \
            --repo "${{ github.repository }}" \
            --title "Reel $TAG" \
            --notes "Pubblicazione automatica"
          {
            echo "tag=$TAG"
            echo "video_url=https://github.com/${{ github.repository }}/releases/download/$TAG/reel.mp4"
          } >> "$GITHUB_OUTPUT"

      - name: Pubblica su Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          VIDEO_URL: ${{ steps.release.outputs.video_url }}
        run: |
          CAPTION="$(cat assets/caption.txt)"
          export CAPTION
          bash scripts/publish_reel.sh
