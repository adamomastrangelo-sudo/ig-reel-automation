name: Genera e pubblica Reel

on:
  schedule:
    # Ogni giorno alle 09:17 UTC (minuto "scomodo" per evitare la coda di
    # congestione che GitHub crea sugli orari tondi come le 09:00 in punto,
    # usati da moltissimi altri workflow schedulati nel mondo).
    # Modifica questa riga per cambiare la cadenza (es. "17 9 * * 1,4" = lunedì e giovedì).
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Genera il video senza pubblicarlo (anteprima, scaricabile come artifact)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-open-sans fonts-dejavu-core

      - name: Scarica il prossimo testo dal Google Sheet
        env:
          SHEET_CSV_URL: ${{ vars.SHEET_CSV_URL }}
        run: bash scripts/fetch_next_caption.sh

      - name: Genera il video
        run: bash scripts/generate_video.sh

      - name: Carica video come artifact (anteprima, dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: reel-preview
          path: output/reel.mp4
          retention-days: 7

      - name: Crea GitHub Release con il video (hosting pubblico)
        id: release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="reel-$(date -u +%Y%m%d-%H%M%S)"
          gh release create "$TAG" output/reel.mp4 \
            --repo "${{ github.repository }}" \
            --title "Reel $TAG" \
            --notes "Pubblicazione automatica"
          {
            echo "tag=$TAG"
            echo "video_url=https://github.com/${{ github.repository }}/releases/download/$TAG/reel.mp4"
          } >> "$GITHUB_OUTPUT"

      - name: Pubblica su Instagram
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          VIDEO_URL: ${{ steps.release.outputs.video_url }}
        run: |
          CAPTION="$(cat assets/caption.txt)"
          export CAPTION
          bash scripts/publish_reel.sh

      - name: Aggiorna lo stato della coda testi
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/queue_index.txt
          if ! git diff --cached --quiet; then
            git commit -m "Aggiorna indice coda testi"
            git push
          else
            echo "Nessuna modifica allo stato da committare."
          fi
